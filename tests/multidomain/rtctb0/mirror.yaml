  TsnLowTxTimeStampEnabled: false
  TsnLowVid: 100
  TsnLowNumFramesPerCycle: 1
  TsnLowPayloadPattern: |
    TsnLowPayloadPattern
  TsnLowFrameLength: 128
  TsnLowRxQueue: 1
  TsnLowTxQueue: 1
  TsnLowSocketPriority: 6
  TsnLowTxThreadPriority: 98
  TsnLowRxThreadPriority: 98
  TsnLowTxThreadCpu: 1
  TsnLowRxThreadCpu: 1
  TsnLowInterface: enp1s0
  TsnLowDestination: 80:6d:97:5b:71:95
RTC:
  RtcEnabled: false
  RtcXdpEnabled: true
  RtcXdpSkbMode: false
  RtcXdpZcMode: true
  RtcXdpWakeupMode: true
  RtcTxTimeStampEnabled: false
  RtcVid: 100
  RtcNumFramesPerCycle: 1
  RtcPayloadPattern: |
    RtcPayloadPattern
  RtcFrameLength: 128
  RtcRxQueue: 2
  RtcTxQueue: 2
  RtcSocketPriority: 5
