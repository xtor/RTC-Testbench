  UdpLowFrameLength: 1400
  UdpLowRxQueue: 3
  UdpLowTxQueue: 3
  UdpLowSocketPriority: 3
  UdpLowTxThreadPriority: 51
  UdpLowRxThreadPriority: 51
  UdpLowTxThreadCpu: 7
  UdpLowRxThreadCpu: 7
  UdpLowInterface: enp1s0
  UdpLowPort: 6667
  UdpLowDestination: 192.168.1.1
  UdpLowSource: 192.168.1.2
