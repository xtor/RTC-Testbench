#
# ptp4l configuration file implementing IEEE 802.1AS-2020 multiple time domains
# and forcing the master and slave roles as in IEC/IEEE 60802.
#
# This implements the master role relying on CMLDS.


[global]
#
# 802.1AS-2020 configuration customized for CMLDS and slave role.
#
gmCapable               1
priority1               248
priority2               248
logAnnounceInterval     0
logSyncInterval         -3
syncReceiptTimeout      3
#neighborPropDelayThresh 800
#min_neighbor_prop_delay -20000000
assume_two_step         1
path_trace_enabled      1
follow_up_info          1
#allowedLostResponses       9
transportSpecific       0x1
ptp_dst_mac             01:80:C2:00:00:0E
network_transport       L2
delay_mechanism         COMMON_P2P

#
# Domain and instance identification
#
domainNumber		0
clockIdentity           000001.0000.000000
message_tag		master

#
# UDS interfaces
#
uds_address		/var/run/ptp4l-master
uds_ro_address		/var/run/ptp4lro-master
cmlds.client_address    /var/run/cmlds-client-master-0
cmlds.server_address    /var/run/cmlds_server
cmlds.domainNumber      0

#
# Engineered Sync Tree
#
BMCA                    noop
serverOnly              1
inhibit_announce        1
asCapable               true
utc_offset		37

#
# PHC selection
#
phc_index                 4

#
# Debug
#
logging_level              7
