#
# ptp4l configuration file implementing IEEE 802.1AS-2020 multiple time domains
# and forcing the master and slave roles as in IEC/IEEE 60802.
#
# This implements the CMLDS server.


[global]
#
# 802.1AS-2020 configuration customized for CMLDS server role.
#
#gmCapable               1
#priority1               248
#priority2               248
#logAnnounceInterval     0
#logSyncInterval         -3
#syncReceiptTimeout      3
neighborPropDelayThresh 800
min_neighbor_prop_delay -20000000
assume_two_step         1
#path_trace_enabled      1
follow_up_info          1
allowedLostResponses       9
transportSpecific       2
ptp_dst_mac             01:80:C2:00:00:0E
network_transport       L2
delay_mechanism         P2P

#
# Domain and instance identification
#
domainNumber		0
clockIdentity           000001.0000.800000
message_tag		cmlds

#
# UDS interfaces
#
uds_address             /var/run/cmlds_server

#
# CMLDS server
#
# BMCA noop should never be used for CMLDS, as it has many side effects
clientOnly                 1
free_running               1
ignore_transport_specific  1
inhibit_announce        1

#
# PHC selection
#
phc_index                  4

#
# Debug
#
logging_level              7




# Reset general port faults immediately
fault_reset_interval       1

# Reset peer network misconfigurations immediately
fault_badpeernet_interval  1
